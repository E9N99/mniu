<!doctype html>

<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>منيو المطعم الاحترافي</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#f4f7fb;
  --card:#fff;
  --text:#111827;
  --line:#dbe3ea;
  --main:#0f766e;
  --main2:#115e59;
  --orange:#ea580c;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  font-family:Tahoma;
  background:var(--bg);
  color:var(--text);
}
img{
  width:100%;
  display:block;
  object-fit:cover;
}
button{
  border:none;
  cursor:pointer;
}
.topbar{
  position:sticky;
  top:0;
  z-index:99;
  background:white;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--line);
}
.brand{
  font-size:22px;
  font-weight:800;
  color:var(--main);
}
.tabs{
  display:flex;
  gap:10px;
}
.tab{
  padding:10px 16px;
  border-radius:10px;
  background:#eef3f7;
}
.tab.active{
  background:var(--main);
  color:white;
}
.container{
  width:min(1400px,95%);
  margin:auto;
}
.hero{
  height:320px;
  border-radius:24px;
  margin:24px 0;
  overflow:hidden;
  display:flex;
  align-items:end;
  padding:40px;
  color:white;
  background:
  linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
  url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1800&auto=format&fit=crop") center/cover;
}
.hero h1{
  font-size:60px;
}
.layout{
  display:grid;
  grid-template-columns:1fr 360px;
  gap:20px;
}
.search{
  margin-bottom:16px;
}
.search input{
  width:100%;
  height:48px;
  border-radius:14px;
  border:1px solid var(--line);
  padding:0 16px;
  font-size:16px;
}
.categories{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  overflow:auto;
}
.cat{
  padding:10px 18px;
  border-radius:999px;
  background:white;
  border:1px solid var(--line);
  white-space:nowrap;
}
.cat.active{
  background:var(--orange);
  color:white;
}
.menu{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:18px;
}
.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  transition:.25s;
}
.card:hover{
  transform:translateY(-6px);
}
.card-image{
  height:220px;
}
.card-body{
  padding:18px;
}
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:start;
  margin-bottom:10px;
}
.price{
  color:var(--orange);
  font-weight:800;
}
.desc{
  color:#6b7280;
  line-height:1.7;
  margin-bottom:16px;
}
.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.qty{
  display:flex;
  align-items:center;
  gap:10px;
}
.qty button{
  width:34px;
  height:34px;
  border-radius:8px;
  background:#eef2f7;
}
.add{
  background:var(--main);
  color:white;
  padding:10px 16px;
  border-radius:10px;
}
.cart{
  position:sticky;
  top:100px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  height:max-content;
}
.cart h2{
  margin-bottom:20px;
}
.cart-lines{
  display:grid;
  gap:12px;
  margin-bottom:20px;
}
.line{
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
}
.line-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
}
.total{
  display:flex;
  justify-content:space-between;
  margin:20px 0;
  font-size:22px;
  font-weight:800;
}
.main-btn{
  width:100%;
  height:48px;
  border-radius:12px;
  background:var(--main);
  color:white;
  font-size:16px;
  margin-bottom:10px;
}
.ghost{
  width:100%;
  height:48px;
  border-radius:12px;
  background:#eef2f7;
}
.orders{
  margin-top:40px;
}
.orders-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;
}
.order{
  background:white;
  border-radius:20px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.status{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:#dcfce7;
  color:#166534;
  font-size:13px;
  margin-top:10px;
}
.chart{
  margin-top:40px;
  background:white;
  border-radius:20px;
  padding:20px;
}
.loader{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:grid;
  place-items:center;
  z-index:99999;
}
.spinner{
  width:70px;
  height:70px;
  border:6px solid rgba(255,255,255,.2);
  border-top-color:white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}
.hidden{
  display:none;
}
@media(max-width:1000px){
  .layout{
    grid-template-columns:1fr;
  }
  .cart{
    position:static;
  }
}
</style>
</head>
<body>
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>
<header class="topbar">
<div class="brand">
🍽️ منيو المطعم الاحترافي
</div>
<div class="tabs">
<button class="tab active">الزبون</button>
<button class="tab">الكاشير</button>
<button class="tab">التقارير</button>
</div>
</header>
<div class="container">
<section class="hero">
<div>
<h1>اطلب من طاولتك</h1>
<p>منيو احترافي حديث للمطاعم والكافيهات</p>
</div>
</section>
<div class="layout">
<div>
<div class="search">
<input type="search" id="searchInput" placeholder="ابحث عن صنف...">
</div>
<div class="categories" id="categories"></div>
<div class="menu" id="menu"></div>
<section class="orders">
<h2 style="margin-bottom:20px;">
الطلبات الحالية
</h2>
<div class="orders-grid" id="orders"></div>
</section>
<section class="chart">
<h2 style="margin-bottom:20px;">
إحصائيات المبيعات
</h2>
</section>
</div>
<aside class="cart">
<h2>سلتك</h2>
<div class="cart-lines" id="cartLines"></div>
<div style="margin-bottom:16px;">

<input
id=“coupon”
placeholder=“كود الخصم”
style=”
width:100%;
height:45px;
padding:0 14px;
border-radius:12px;
border:1px solid #dbe3ea;
“

</div>
<div class="total">
<span>الإجمالي</span>
<span id="total">0 د.ع</span>
</div>
<button class="main-btn" id="submit">
إرسال الطلب
</button>
<button class="ghost" id="clear">
تفريغ السلة
</button>
</aside>
</div>
</div>
<script>
const categories = [
"المقبلات",
"الأطباق الرئيسية",
"المشروبات",
"الحلويات"
];
const coupons = {
VIP20:0.20,
SAVE10:0.10
};
const menuData = [
{
id:1,
name:"بركر لحم",
category:"الأطباق الرئيسية",
price:12000,
image:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1200&auto=format&fit=crop",
description:"بركر لحم مع جبنة وصلصة خاصة"
},
{
id:2,
name:"بيتزا",
category:"الأطباق الرئيسية",
price:15000,
image:"https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1200&auto=format&fit=crop",
description:"بيتزا إيطالية ساخنة"
},
{
id:3,
name:"موهيتو",
category:"المشروبات",
price:5000,
image:"https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=1200&auto=format&fit=crop",
description:"مشروب بارد منعش"
},
{
id:4,
name:"كنافة",
category:"الحلويات",
price:7000,
image:"https://images.unsplash.com/photo-1605197183305-6cae1788bc93?q=80&w=1200&auto=format&fit=crop",
description:"كنافة ساخنة بالفستق"
}
];
const state = {
category:"الأطباق الرئيسية",
search:"",
cart:{},
orders:[]
};
const menu = document.getElementById("menu");
const categoriesEl = document.getElementById("categories");
const cartLines = document.getElementById("cartLines");
const totalEl = document.getElementById("total");
const ordersEl = document.getElementById("orders");
function money(v){
return `${v.toLocaleString("ar-IQ")} د.ع`;
}
function renderCategories(){
categoriesEl.innerHTML =
categories.map(cat=>`
<button
class="cat ${state.category===cat?"active":""}"
onclick="changeCategory('${cat}')"
>
${cat}
</button>
`).join("");
}
function changeCategory(cat){
state.category = cat;
renderMenu();
renderCategories();
}
function renderMenu(){
const items = menuData.filter(item=>{
return item.category===state.category &&
item.name.includes(state.search);
});
menu.innerHTML = items.map(item=>{
const qty = state.cart[item.id]?.qty || 0;
return `
<div class="card">
<div class="card-image">
<img
src="${item.image}"
onerror="this.src='https://via.placeholder.com/500x300'"
>
</div>
<div class="card-body">
<div class="card-top">
<h3>${item.name}</h3>
<div class="price">
${money(item.price)}
</div>
</div>
<div class="desc">
${item.description}
</div>
<div class="actions">
<div class="qty">
<button onclick="changeQty(${item.id},-1)">
-
</button>
<b>${qty}</b>
<button onclick="changeQty(${item.id},1)">
+
</button>
</div>
<button
class="add"
onclick="changeQty(${item.id},1)"
>
إضافة
</button>
</div>
</div>
</div>
`;
}).join("");
}
function changeQty(id,delta){
const item = menuData.find(x=>x.id===id);
if(!item) return;
const current = state.cart[id] || {
...item,
qty:0,
note:""
};
current.qty += delta;
if(current.qty<=0){
delete state.cart[id];
}else{
state.cart[id]=current;
}
renderCart();
renderMenu();
}
function renderCart(){
const lines = Object.values(state.cart);
cartLines.innerHTML = lines.map(item=>`
<div class="line">
<div class="line-top">
<b>
${item.name} × ${item.qty}
</b>
<b>
${money(item.price * item.qty)}
</b>
</div>
<textarea
placeholder="ملاحظة"
oninput="updateNote(${item.id},this.value)"
>
${item.note}
</textarea>
</div>

`).join(””);

let total = lines.reduce((s,i)=>{

return s + (i.price*i.qty);

},0);

const code =
document.getElementById(“coupon”).value.trim();

if(coupons[code]){

total -= total * coupons[code];

}

total += total * 0.05;

totalEl.textContent = money(total);

}

function updateNote(id,value){

if(state.cart[id]){

state.cart[id].note = value;

}

}

const sound = new Audio(
“https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3”
);

function submitOrder(){

const items = Object.values(state.cart);

if(!items.length) return;

let total = items.reduce((s,i)=>{

return s + i.price*i.qty;

},0);

const code =
document.getElementById(“coupon”).value.trim();

if(coupons[code]){

total -= total * coupons[code];

}

total += total * 0.05;

state.orders.unshift({

id:Date.now(),

items,

total,

time:new Date().toLocaleTimeString(“ar-IQ”)

});

state.cart = {};

sound.play();

renderCart();

renderMenu();

renderOrders();

renderChart();

alert(“تم إرسال الطلب بنجاح”);

}

function renderOrders(){

ordersEl.innerHTML =
state.orders.map(order=>`

<div class="order">
<h3>
طلب #${order.id}
</h3>
<div style="margin:14px 0;">

${order.items.map(item=>`

<div style="margin-bottom:8px;">

${item.name} × ${item.qty}

</div>

`).join(””)}

</div>
<div>

${money(order.total)}

</div>
<div class="status">

تم الاستلام

</div>
</div>

`).join(””);

}

function renderChart(){

const canvas =
document.getElementById(“salesChart”);

if(window.chart){

window.chart.destroy();

}

window.chart = new Chart(canvas,{

type:“bar”,

data:{

labels:state.orders.map(o=>o.time),

datasets:[{

label:“المبيعات”,

data:state.orders.map(o=>o.total)

}]

}

});

}

document.getElementById(“searchInput”)
.addEventListener(“input”,e=>{

state.search = e.target.value.trim();

renderMenu();

});

document.getElementById(“submit”)
.addEventListener(“click”,submitOrder);

document.getElementById(“clear”)
.addEventListener(“click”,()=>{

state.cart = {};

renderCart();

renderMenu();

});

window.addEventListener(“load”,()=>{

setTimeout(()=>{

document
.getElementById(“loader”)
.classList
.add(“hidden”);

},1000);

});

renderCategories();
renderMenu();
renderCart();
renderOrders();
renderChart();

</script>
</body>
</html>
